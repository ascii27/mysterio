services:
  postgres:
    image: postgres:16
    container_name: mysterio-pg
    environment:
      POSTGRES_USER: mysterio
      POSTGRES_PASSWORD: mysterio
      POSTGRES_DB: mysterio
    ports:
      - "5432:5432"
    volumes:
      - mysterio-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mysterio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysterio-pg-data:
